name: "Generate prebuild"
description: "Build a nodejs-mobile prebuild for a native module"

inputs:
  module_name:
    description: "The name of the module to prebuild"
    required: true
  platform:
    description: "The platform to prebuild for"
    required: true
    default: "android"
  arch:
    description: "The architecture to prebuild for"
    required: true
    default: "arm64"
  simulator:
    description: "Build for a simulator (iOS only). Accepts 'true' or 'false'."
    required: false
    default: "false"
  module_version:
    description: "The version of the module to prebuild"
    required: false
    default: "latest"
  patches_dir:
    description: |
      Directory in the caller's workspace holding patches in the
      patch-package convention: `<module_name>+<version>.patch`. A file
      matching the resolved module_version is applied with `patch -p1
      --forward` after unpack and before install. If sibling patches
      exist for the same module at other versions but none matches, the
      step fails loudly (typically a forgotten rename after a version
      bump).
    required: false
    default: "patches"
  node_version:
    description: "Node.js version to use"
    required: false
    default: "24"

outputs:
  module_version:
    description: "The resolved version of the module"
    value: ${{ steps.parse-module-version.outputs.version }}
  target:
    description: "The prebuild target name (e.g. 'ios-arm64-simulator')"
    value: ${{ steps.target.outputs.target }}

runs:
  using: "composite"
  steps:
    - name: Validate platform/arch/simulator combination
      shell: bash
      run: |
        platform="${{ inputs.platform }}"
        arch="${{ inputs.arch }}"
        simulator="${{ inputs.simulator }}"

        case "$platform" in
          ios|macos)
            if [ "$RUNNER_OS" != "macOS" ]; then
              echo "::error::Platform '$platform' requires a macOS runner, but runner is '$RUNNER_OS'. Set 'runs-on: macos-latest' (or similar) in the calling job."
              exit 1
            fi
            ;;
        esac

        if [ "$simulator" = "true" ] && [ "$platform" != "ios" ]; then
          echo "::error::simulator=true is only valid for platform=ios"
          exit 1
        fi

        if [ "$platform" = "ios" ] && [ "$arch" = "x64" ] && [ "$simulator" != "true" ]; then
          echo "::error::ios + x64 requires simulator=true (iOS devices are arm64-only)"
          exit 1
        fi

    - name: Compute target suffix
      id: target
      shell: bash
      run: |
        suffix=""
        if [ "${{ inputs.simulator }}" = "true" ]; then
          suffix="-simulator"
        fi
        echo "target=${{ inputs.platform }}-${{ inputs.arch }}${suffix}" >> $GITHUB_OUTPUT

    - name: Use Node.js ${{ inputs.node_version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}

    - name: Download npm package and unpack
      shell: bash
      run:
        npm pack ${{ inputs.module_name }}@${{ inputs.module_version }} | xargs
        tar -zxvf

    - name: Parse module version
      id: parse-module-version
      shell: bash
      working-directory: ./package
      run: echo version=$(jq -r .version package.json) >> $GITHUB_OUTPUT

    - name: Apply version-pinned patch (if one matches)
      shell: bash
      working-directory: ./package
      env:
        PATCHES_DIR: ${{ inputs.patches_dir }}
        MODULE_NAME: ${{ inputs.module_name }}
        VERSION: ${{ steps.parse-module-version.outputs.version }}
      run: |
        set -eu
        # patch-package convention: patches/<module>+<version>.patch.
        # The caller's repo is checked out at $GITHUB_WORKSPACE so
        # PATCHES_DIR resolves there, not inside ./package.
        patches_root="${GITHUB_WORKSPACE}/${PATCHES_DIR}"
        match="${patches_root}/${MODULE_NAME}+${VERSION}.patch"

        if [ -f "$match" ]; then
          echo "Applying patch: ${match}"
          # --forward + no backup = clean failure on a bad patch instead
          # of .rej/.orig litter and a false-positive exit 0.
          patch -p1 --forward --no-backup-if-mismatch < "$match"
          exit 0
        fi

        # No exact match — if the caller maintains patches for this
        # module at other versions, fail loudly. Nearly always a typo
        # in the filename or a forgotten rename after bumping
        # module_version.
        if compgen -G "${patches_root}/${MODULE_NAME}+*.patch" >/dev/null; then
          echo "::error::No patch matches ${MODULE_NAME}+${VERSION}.patch in ${PATCHES_DIR}/, but other versions exist. Add a patch for ${VERSION} or remove the stale ones."
          echo "Available patches:"
          ls "${patches_root}/${MODULE_NAME}"+*.patch
          exit 1
        fi

        echo "No patch to apply (no ${MODULE_NAME}+*.patch files in ${PATCHES_DIR}/)."

    - name: Install bare-make
      shell: bash
      run: npm install -g bare-make

    - name: Install deps for package
      shell: bash
      working-directory: ./package
      run: npm install

    - name: Install patched cmake-napi
      shell: bash
      working-directory: ./package
      run: npm install cmake-napi@github:digidem/cmake-napi-nodejs-mobile

    - name: Generate
      shell: bash
      working-directory: ./package
      run: |
        extra_args=()
        case "${{ inputs.platform }}" in
          android|linux)
            extra_args+=(-D CMAKE_SHARED_LINKER_FLAGS="-Wl,-z,max-page-size=16384")
            ;;
        esac
        case "${{ inputs.platform }}" in
          android)
            # bare-make's Android toolchain leaves ANDROID_STL=none, so the
            # NDK's clang adds -nostdinc++ and no C++ stdlib headers are in
            # scope. Modules that include any C++ stdlib header (e.g.
            # sodium-native >=5.x via libjstl, quickbit-native via bare-api)
            # won't compile.
            #
            # Inject the NDK's own libc++ headers as a system include —
            # equivalent to the `target_include_directories(... SYSTEM
            # PRIVATE "${CMAKE_SYSROOT}/usr/include/c++/v1")` pattern modules
            # have otherwise had to carry as a patch. We set this for both C
            # and C++ languages because bare-make's pipeline runs the C
            # compiler over C++ headers in some configurations.
            NDK_ROOT="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-${ANDROID_NDK:-}}}"
            if [ -z "$NDK_ROOT" ]; then
              NDK_ROOT=$(ls -d "${ANDROID_HOME}/ndk"/*/ 2>/dev/null | sort -V | tail -1)
              NDK_ROOT="${NDK_ROOT%/}"
            fi
            LIBCXX_INCLUDE="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/c++/v1"
            if [ ! -d "$LIBCXX_INCLUDE" ]; then
              echo "::error::Could not find NDK libc++ headers at $LIBCXX_INCLUDE"
              exit 1
            fi
            extra_args+=(-D "CMAKE_CXX_STANDARD_INCLUDE_DIRECTORIES=$LIBCXX_INCLUDE")
            extra_args+=(-D "CMAKE_C_STANDARD_INCLUDE_DIRECTORIES=$LIBCXX_INCLUDE")
            ;;
        esac
        if [ "${{ inputs.simulator }}" = "true" ]; then
          extra_args+=(--simulator)
        fi
        bare-make generate \
          --platform ${{ inputs.platform }} \
          --arch ${{ inputs.arch }} \
          "${extra_args[@]}"

    - name: Build
      shell: bash
      working-directory: ./package
      run: bare-make build

    - name: Install
      shell: bash
      working-directory: ./package
      run: bare-make install

    - name: Upload prebuild artifacts
      uses: actions/upload-artifact@v7
      with:
        name:
          ${{ inputs.module_name }}-${{
          steps.parse-module-version.outputs.version }}-${{
          steps.target.outputs.target }}
        path: ./package/prebuilds/${{ steps.target.outputs.target }}/*.node
