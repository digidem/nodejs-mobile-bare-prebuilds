name: "Assemble nodejs-project for testing"
description: |
  Parses `module_spec` into name + version, downloads the prebuild artifact,
  installs the module under test into a `nodejs-project/` tree, and packages
  the addon for the platform's runtime loader:
    - android: .node copied to jniLibs/<abi>/lib<name>.so (mmap'd from APK)
    - ios:     .node wrapped into <name>.xcframework, embedded & signed
  Writes an `addon-manifest.json` the preload script reads at runtime; the
  preload patches require() so `require('<module>')` returns a pre-dlopen'd
  handle instead of the module's own loader walking node_modules/prebuilds/.

  Three test-runner modes (selected by `test_runner`):
  - 'smoke'  (default): generated test that just `require()`s the module.
  - 'module': runs the module's own `test/*.js` (test folder + devDeps
              pulled from the upstream repo + tarball's package.json).
  - 'custom': copies the caller's `test_script` in as test.js.

  Requires `node`/`npm` on PATH — add an `actions/setup-node` step before
  calling this action. iOS also needs `xcodebuild` (macOS runner).

inputs:
  module_spec:
    description: "'<module_name>@<version>' (npm spec format, e.g. 'sodium-native@5.1.0')"
    required: true
  platform:
    description: |
      'android' or 'ios' — selects the runtime packaging shape
      (jniLibs/lib*.so for android, *.xcframework for ios) and the
      manifest value `preload.js` reads at runtime.
    required: true
  target:
    description: |
      The prebuild artifact's platform/arch tuple (e.g. 'android-x64',
      'android-arm64', 'ios-arm64'). Determines the default artifact name
      and — on Android — the ABI dir the .node is renamed into
      (android-x64 → x86_64, android-arm64 → arm64-v8a).
    required: true
  artifact_suffix:
    description: |
      Appended to the default artifact name (e.g. '-simulator' for iOS
      simulator builds, where the build target has '-simulator' in its name
      but the runtime install target doesn't).
    required: false
    default: ""
  artifact_name:
    description: |
      Overrides the default artifact name. If empty, defaults to
      '<module_name>-<version>-<target><artifact_suffix>'.
    required: false
    default: ""
  test_runner:
    description: |
      One of 'smoke' (default), 'module', or 'custom'.
      - 'smoke':  auto-generated test that just require()s the module.
      - 'module': runs the module's own test/*.js; devDeps installed
                  from the tarball's package.json so any test runner
                  the module uses (brittle / tape / tap / ...) is
                  available at require() time.
      - 'custom': uses the file pointed to by `test_script`.
    required: false
    default: "smoke"
  test_script:
    description: |
      Path to a caller-provided test script (relative to $GITHUB_WORKSPACE).
      Only used when test_runner is 'custom'.
    required: false
    default: ""
  test_exclude:
    description: |
      Newline-separated list of test file basenames to skip when
      test_runner is 'module'. Matched against the filename at the
      overlaid location (e.g. 'test-ipc.js', not a full path). Useful for
      modules whose suite includes a few cases that can't run in the
      sandbox (process spawning, fs paths outside the app container, etc.).
    required: false
    default: ""
  git_repo_slug:
    description: |
      'owner/repo' for the module's upstream GitHub repo. Combined with
      `git_ref`, used to check out the upstream `test/` folder and overlay
      it into `node_modules/<module>/test/` — the npm tarball typically
      omits tests via .npmignore. Only consulted when test_runner is
      'module'.
    required: false
    default: ""
  git_ref:
    description: |
      Commit SHA or tag name to check out the upstream repo at. Accepted
      by `actions/checkout`'s `ref:` input. Only consulted when
      test_runner is 'module'.
    required: false
    default: ""
  nodejs_project_dir:
    description:
      "Absolute or workspace-relative directory to assemble the nodejs-project
      tree in. Created if it does not exist."
    required: true

runs:
  using: composite
  steps:
    - name: Parse module_spec
      id: spec
      shell: bash
      env:
        MODULE_SPEC: ${{ inputs.module_spec }}
        TARGET: ${{ inputs.target }}
        ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
      run: |
        set -eu
        # Greedy-left / greedy-right handles scoped packages (@scope/pkg@1.0.0).
        MODULE_NAME="${MODULE_SPEC%@*}"
        MODULE_VERSION="${MODULE_SPEC##*@}"
        if [ -z "$MODULE_NAME" ] || [ -z "$MODULE_VERSION" ] || [ "$MODULE_NAME" = "$MODULE_SPEC" ]; then
          echo "::error::module_spec must be '<module_name>@<version>', got '${MODULE_SPEC}'."
          exit 1
        fi
        artifact="${ARTIFACT_NAME:-${MODULE_NAME}-${MODULE_VERSION}-${TARGET}${ARTIFACT_SUFFIX}}"
        echo "module_name=${MODULE_NAME}"       >> "$GITHUB_OUTPUT"
        echo "module_version=${MODULE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "artifact_name=${artifact}"        >> "$GITHUB_OUTPUT"

    - name: Download prebuild artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ steps.spec.outputs.artifact_name }}
        path: ${{ runner.temp }}/prebuild

    - name: Install module (without prebuild)
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        MODULE_VERSION: ${{ steps.spec.outputs.module_version }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -euo pipefail
        mkdir -p "$NODEDIR"
        (
          cd "$NODEDIR"
          npm init -y >/dev/null
          npm install --ignore-scripts --no-audit --no-fund \
            "${MODULE_NAME}@${MODULE_VERSION}"
        )
        # The .node file does NOT go into node_modules/<module>/prebuilds/
        # any more; runtime packaging below handles it. If the tarball
        # shipped stray .node files, leave them — the preload patch wins
        # by intercepting the bare-name require() before the module's own
        # loader walks prebuilds/.

    # Android packaging: each .node is renamed to lib<basename>.so and
    # placed in jniLibs/<abi>/. Android's package installer drops files
    # not matching `lib*.so`, so the prefix is required.
    - name: Place addons as jniLibs (android)
      if: ${{ inputs.platform == 'android' }}
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -euo pipefail
        case "$TARGET" in
          android-x64)   ABI=x86_64 ;;
          android-arm64) ABI=arm64-v8a ;;
          android-arm)   ABI=armeabi-v7a ;;
          *)
            echo "::error::Unsupported android target '$TARGET'"; exit 1 ;;
        esac
        # nodejs_project_dir layout: .../app/src/main/assets/nodejs-project
        # jniLibs lives a sibling of assets/: .../app/src/main/jniLibs
        jni="$(cd "$NODEDIR/../.." && pwd)/jniLibs/$ABI"
        mkdir -p "$jni"
        shopt -s nullglob
        for f in "$RUNNER_TEMP"/prebuild/*.node; do
          base="$(basename "$f" .node)"
          cp "$f" "$jni/lib${base}.so"
        done
        echo "Addons placed under $jni:"
        ls -la "$jni"

    # iOS packaging: each .node is wrapped into a minimal single-slice
    # .xcframework so Xcode's Embed & Sign phase can handle it. Run script
    # in the pbxproj copies the matching slice into the .app at build time.
    - name: Wrap addons as xcframeworks (ios)
      if: ${{ inputs.platform == 'ios' }}
      shell: bash
      env:
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -euo pipefail
        # nodejs_project_dir layout: .../ios/nodejs-project
        # addons/ dir lives alongside it: .../ios/addons
        addons_root="$(cd "$NODEDIR/.." && pwd)/addons"
        rm -rf "$addons_root"
        mkdir -p "$addons_root"

        shopt -s nullglob
        for node_file in "$RUNNER_TEMP"/prebuild/*.node; do
          base="$(basename "$node_file" .node)"
          work="$(mktemp -d)"
          fw="$work/$base.framework"
          mkdir -p "$fw"
          cp "$node_file" "$fw/$base"
          # Rewrite the Mach-O install name so the loader resolves via
          # @rpath at runtime (app's LD_RUNPATH_SEARCH_PATHS includes
          # @executable_path/Frameworks by default).
          install_name_tool -id "@rpath/$base.framework/$base" "$fw/$base"
          cat > "$fw/Info.plist" <<PLIST
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
          <key>CFBundleDevelopmentRegion</key><string>en</string>
          <key>CFBundleExecutable</key><string>$base</string>
          <key>CFBundleIdentifier</key><string>com.digidem.$base</string>
          <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
          <key>CFBundleName</key><string>$base</string>
          <key>CFBundlePackageType</key><string>FMWK</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>MinimumOSVersion</key><string>13.0</string>
        </dict></plist>
        PLIST
          xcodebuild -create-xcframework \
            -framework "$fw" \
            -output "$addons_root/$base.xcframework"
        done
        echo "Addons wrapped under $addons_root:"
        ls -la "$addons_root"

        # Strip any stray .node files from the staged JS tree so Xcode's
        # folder-reference "Copy Bundle Resources" phase doesn't embed
        # them into the .app (which would break codesigning on device
        # builds and is always dead weight).
        find "$NODEDIR/node_modules" -name '*.node' -print -delete || true

    # The `module` test_runner runs the module's own tests, but npm tarballs
    # almost always exclude them (via .npmignore or the package's `files`
    # field). Check out the upstream repo pinned to the SHA/tag resolved
    # from npm metadata and copy its tests into node_modules/<module>/.
    # Two layouts are supported:
    #   - directory:   <repo>/test/*.{js,mjs,cjs}
    #   - single-file: <repo>/test.{js,mjs,cjs}
    # Also pulls package-lock.json so the devDep install below can use
    # `npm ci` for deterministic versions.
    - name: Checkout upstream test/ folder (+ lockfile)
      if: ${{ inputs.test_runner == 'module' && inputs.git_ref != '' }}
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.git_repo_slug }}
        ref: ${{ inputs.git_ref }}
        path: upstream-src
        sparse-checkout: |
          test
          test.js
          test.mjs
          test.cjs
          package-lock.json
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: Overlay upstream tests (and lockfile) into node_modules
      if: ${{ inputs.test_runner == 'module' && inputs.git_ref != '' }}
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -eu
        src_root="${GITHUB_WORKSPACE}/upstream-src"
        mod="${NODEDIR}/node_modules/${MODULE_NAME}"
        overlays=0

        # Directory-style tests.
        if [ -d "${src_root}/test" ]; then
          rm -rf "${mod}/test"
          cp -R "${src_root}/test" "${mod}/test"
          echo "Overlaid upstream test/ → ${mod}/test"
          overlays=$((overlays + 1))
        fi

        # Single-file tests at the repo root (hypercore-style).
        for name in test.js test.mjs test.cjs; do
          if [ -f "${src_root}/${name}" ]; then
            cp "${src_root}/${name}" "${mod}/${name}"
            echo "Overlaid upstream ${name} → ${mod}/${name}"
            overlays=$((overlays + 1))
          fi
        done

        if [ "$overlays" -eq 0 ]; then
          echo "::error::Upstream checkout has no test/ directory or test.{js,mjs,cjs} at repo root"
          exit 1
        fi

        # Optional: copy lockfile so the devDep install step can use `npm ci`.
        # Absent on some older repos / monorepo subdirs; npm install handles
        # that case.
        src_lock="${src_root}/package-lock.json"
        if [ -f "$src_lock" ]; then
          cp "$src_lock" "${mod}/package-lock.json"
          echo "Copied upstream package-lock.json → ${mod}/package-lock.json"
        fi

    # Install the module's devDependencies so its tests can require() whatever
    # test runner + fixture libs the maintainer uses (brittle / tape / tap /
    # etc.). Reads the package.json that shipped in the npm tarball, so the
    # devDep set matches exactly what was published. Uses `npm ci` when the
    # lockfile is present (deterministic), else falls back to `npm install`.
    # No brittle-specific shortcut — if this fails, we fail; better to know
    # than to quietly run against the wrong deps.
    - name: Install module devDependencies
      if: ${{ inputs.test_runner == 'module' }}
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -eu
        mod="${NODEDIR}/node_modules/${MODULE_NAME}"
        cd "$mod"
        if [ -f package-lock.json ]; then
          echo "npm ci in $(pwd) (using upstream package-lock.json)"
          npm ci --ignore-scripts --no-audit --no-fund
        else
          echo "npm install in $(pwd) (no lockfile)"
          npm install --ignore-scripts --no-audit --no-fund --no-save
        fi

    # Writes addon-manifest.json consumed by preload.js at runtime. Each
    # entry maps the npm module name to the on-disk filename inside
    # NATIVE_LIB_DIR (lib<name>.so on android, <name>.xcframework on ios).
    # We only have one addon in the test harness — the module under test —
    # so a single-entry manifest is enough. Filename is derived from the
    # prebuild artifact's .node basename, not the module name, because
    # some modules (bare-subprocess etc.) ship prebuilds with a different
    # short name than the npm package.
    - name: Write addon-manifest.json
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        PLATFORM: ${{ inputs.platform }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -euo pipefail
        # Pick the first .node basename as the canonical addon filename.
        # (Most prebuilds ship exactly one.) Fail loudly if none present.
        first_node="$(ls "$RUNNER_TEMP"/prebuild/*.node 2>/dev/null | head -1 || true)"
        if [ -z "$first_node" ]; then
          echo "::error::No .node files in prebuild artifact"; exit 1
        fi
        base="$(basename "$first_node" .node)"
        case "$PLATFORM" in
          android) file="lib${base}.so" ;;
          ios)     file="${base}.xcframework" ;;
          *) echo "::error::Unknown platform '$PLATFORM'"; exit 1 ;;
        esac
        MANIFEST_PLATFORM="$PLATFORM" MANIFEST_FILE="$file" node -e '
          const fs = require("fs")
          const path = require("path")
          const manifest = {
            platform: process.env.MANIFEST_PLATFORM,
            addons: { [process.env.MODULE_NAME]: process.env.MANIFEST_FILE }
          }
          fs.writeFileSync(
            path.join(process.env.NODEDIR, "addon-manifest.json"),
            JSON.stringify(manifest, null, 2) + "\n"
          )
        '
        cat "$NODEDIR/addon-manifest.json"

    - name: Place main.js, test.js, preload.js, harness-config.json
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        TEST_RUNNER: ${{ inputs.test_runner }}
        TEST_SCRIPT: ${{ inputs.test_script }}
        TEST_EXCLUDE: ${{ inputs.test_exclude }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        # main.js is always the wrapper: installs the exit-sentinel handler,
        # runs preload.js (dlopens addons + patches require()), then hands
        # off to ./test.js.
        cp "$ACTION_PATH/wrapper.js" "$NODEDIR/main.js"
        cp "$ACTION_PATH/preload.js" "$NODEDIR/preload.js"

        # The 'smoke' and 'module' runners read their config (module name,
        # exclude list) from this JSON file at runtime — so the templates are
        # plain runnable JS with no placeholder substitution.
        node -e '
          const fs = require("fs")
          const path = require("path")
          const testExclude = (process.env.TEST_EXCLUDE || "")
            .split(/\r?\n+/)
            .map((s) => s.trim())
            .filter(Boolean)
          const cfg = { moduleName: process.env.MODULE_NAME, testExclude }
          fs.writeFileSync(
            path.join(process.env.NODEDIR, "harness-config.json"),
            JSON.stringify(cfg, null, 2) + "\n"
          )
        '

        case "$TEST_RUNNER" in
          smoke)
            cp "$ACTION_PATH/default-smoke-test.js" "$NODEDIR/test.js"
            echo "test_runner=smoke: generated require() smoke test."
            ;;
          module)
            cp "$ACTION_PATH/module-tests-runner.js" "$NODEDIR/test.js"
            echo "test_runner=module: running ${MODULE_NAME}'s own tests."
            ;;
          custom)
            if [ -z "$TEST_SCRIPT" ]; then
              echo "::error::test_runner=custom requires a non-empty test_script input."
              exit 1
            fi
            if [ ! -f "$TEST_SCRIPT" ]; then
              echo "::error::test_script '$TEST_SCRIPT' not found in caller repo"
              exit 1
            fi
            cp "$TEST_SCRIPT" "$NODEDIR/test.js"
            echo "test_runner=custom: using ${TEST_SCRIPT}."
            ;;
          *)
            echo "::error::Unknown test_runner '$TEST_RUNNER' (expected 'smoke', 'module', or 'custom')."
            exit 1
            ;;
        esac
