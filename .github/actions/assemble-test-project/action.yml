name: "Assemble nodejs-project for testing"
description: |
  Parses `module_spec` into name + version, downloads the prebuild artifact,
  installs the module under test into a `nodejs-project/` tree, drops the
  prebuilt `.node` files into `node_modules/<module>/prebuilds/<target>/`,
  and places a `main.js` entry point.

  Three test-runner modes (selected by `test_runner`):
  - 'smoke'  (default): generated test that just `require()`s the module.
  - 'module': runs the module's own `test/*.js` via brittle.
  - 'custom': copies the caller's `test_script` in as test.js.

  Requires `node`/`npm` on PATH — add an `actions/setup-node` step before
  calling this action.

inputs:
  module_spec:
    description: "'<module_name>@<version>' (npm spec format, e.g. 'sodium-native@5.1.0')"
    required: true
  target:
    description: |
      The `prebuilds/<dir>/` subfolder to install the .node file into.
      This is what the runtime loader (require-addon / bare-addon-resolve)
      will look for at `process.platform + '-' + process.arch`.
    required: true
  artifact_suffix:
    description: |
      Appended to the default artifact name (e.g. '-simulator' for iOS
      simulator builds, where the build target has '-simulator' in its name
      but the runtime install target doesn't).
    required: false
    default: ""
  artifact_name:
    description: |
      Overrides the default artifact name. If empty, defaults to
      '<module_name>-<version>-<target><artifact_suffix>'.
    required: false
    default: ""
  test_runner:
    description: |
      One of 'smoke' (default), 'module', or 'custom'.
      - 'smoke':  auto-generated test that just require()s the module.
      - 'module': runs the module's own test/*.js (requires brittle).
      - 'custom': uses the file pointed to by `test_script`.
    required: false
    default: "smoke"
  test_script:
    description: |
      Path to a caller-provided test script (relative to $GITHUB_WORKSPACE).
      Only used when test_runner is 'custom'.
    required: false
    default: ""
  git_repo_slug:
    description: |
      'owner/repo' for the module's upstream GitHub repo. Combined with
      `git_ref`, used to check out the upstream `test/` folder and overlay
      it into `node_modules/<module>/test/` — the npm tarball typically
      omits tests via .npmignore. Only consulted when test_runner is
      'module'.
    required: false
    default: ""
  git_ref:
    description: |
      Commit SHA or tag name to check out the upstream repo at. Accepted
      by `actions/checkout`'s `ref:` input. Only consulted when
      test_runner is 'module'.
    required: false
    default: ""
  nodejs_project_dir:
    description:
      "Absolute or workspace-relative directory to assemble the nodejs-project
      tree in. Created if it does not exist."
    required: true

runs:
  using: composite
  steps:
    - name: Parse module_spec
      id: spec
      shell: bash
      env:
        MODULE_SPEC: ${{ inputs.module_spec }}
        TARGET: ${{ inputs.target }}
        ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
      run: |
        set -eu
        # Greedy-left / greedy-right handles scoped packages (@scope/pkg@1.0.0).
        MODULE_NAME="${MODULE_SPEC%@*}"
        MODULE_VERSION="${MODULE_SPEC##*@}"
        if [ -z "$MODULE_NAME" ] || [ -z "$MODULE_VERSION" ] || [ "$MODULE_NAME" = "$MODULE_SPEC" ]; then
          echo "::error::module_spec must be '<module_name>@<version>', got '${MODULE_SPEC}'."
          exit 1
        fi
        artifact="${ARTIFACT_NAME:-${MODULE_NAME}-${MODULE_VERSION}-${TARGET}${ARTIFACT_SUFFIX}}"
        echo "module_name=${MODULE_NAME}"       >> "$GITHUB_OUTPUT"
        echo "module_version=${MODULE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "artifact_name=${artifact}"        >> "$GITHUB_OUTPUT"

    - name: Download prebuild artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ steps.spec.outputs.artifact_name }}
        path: ${{ runner.temp }}/prebuild

    - name: Install module and place prebuild
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        MODULE_VERSION: ${{ steps.spec.outputs.module_version }}
        TARGET: ${{ inputs.target }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
        TEST_RUNNER: ${{ inputs.test_runner }}
      run: |
        set -euo pipefail
        mkdir -p "$NODEDIR"
        (
          cd "$NODEDIR"
          npm init -y >/dev/null
          npm install --ignore-scripts --no-audit --no-fund \
            "${MODULE_NAME}@${MODULE_VERSION}"
          # The module's own test files are in the npm tarball but brittle
          # (a devDep) isn't pulled in by `npm install <pkg>`. Install it
          # alongside when we're going to run the module's tests.
          if [ "$TEST_RUNNER" = "module" ]; then
            npm install --ignore-scripts --no-audit --no-fund --no-save brittle
          fi
        )
        dst="$NODEDIR/node_modules/${MODULE_NAME}/prebuilds/${TARGET}"
        mkdir -p "$dst"
        cp "$RUNNER_TEMP"/prebuild/*.node "$dst/"
        echo "Prebuild placed under $dst:"
        ls -la "$dst"

    # The `module` test_runner runs the module's own test/*.js via brittle,
    # but npm tarballs almost always exclude test/ (via .npmignore or the
    # package's `files` field). Check out the upstream repo pinned to the
    # SHA/tag resolved from npm metadata and copy its test/ directory into
    # node_modules/<module>/test/.
    - name: Checkout upstream test/ folder
      if: ${{ inputs.test_runner == 'module' && inputs.git_ref != '' }}
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.git_repo_slug }}
        ref: ${{ inputs.git_ref }}
        path: upstream-src
        sparse-checkout: test
        sparse-checkout-cone-mode: false
        fetch-depth: 1

    - name: Overlay upstream test/ into node_modules
      if: ${{ inputs.test_runner == 'module' && inputs.git_ref != '' }}
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
      run: |
        set -eu
        src="${GITHUB_WORKSPACE}/upstream-src/test"
        if [ ! -d "$src" ]; then
          echo "::error::Upstream checkout has no test/ directory at ${src}"
          exit 1
        fi
        dst="${NODEDIR}/node_modules/${MODULE_NAME}/test"
        rm -rf "$dst"
        cp -R "$src" "$dst"
        echo "Overlaid upstream test/ → ${dst}"

    - name: Place main.js and test.js
      shell: bash
      env:
        MODULE_NAME: ${{ steps.spec.outputs.module_name }}
        TEST_RUNNER: ${{ inputs.test_runner }}
        TEST_SCRIPT: ${{ inputs.test_script }}
        NODEDIR: ${{ inputs.nodejs_project_dir }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        # main.js is always the wrapper: it installs the exit-sentinel handler
        # and then delegates to ./test.js.
        cp "$ACTION_PATH/wrapper.js" "$NODEDIR/main.js"

        case "$TEST_RUNNER" in
          smoke)
            template="$ACTION_PATH/default-smoke-test.js"
            esc=$(printf '%s' "$MODULE_NAME" | sed 's/[\\/&]/\\&/g')
            sed "s/__MODULE_NAME__/$esc/g" "$template" > "$NODEDIR/test.js"
            echo "test_runner=smoke: generated require() smoke test."
            ;;
          module)
            template="$ACTION_PATH/module-tests-runner.js"
            esc=$(printf '%s' "$MODULE_NAME" | sed 's/[\\/&]/\\&/g')
            sed "s/__MODULE_NAME__/$esc/g" "$template" > "$NODEDIR/test.js"
            echo "test_runner=module: running ${MODULE_NAME}'s own test/*.js via brittle."
            ;;
          custom)
            if [ -z "$TEST_SCRIPT" ]; then
              echo "::error::test_runner=custom requires a non-empty test_script input."
              exit 1
            fi
            if [ ! -f "$TEST_SCRIPT" ]; then
              echo "::error::test_script '$TEST_SCRIPT' not found in caller repo"
              exit 1
            fi
            cp "$TEST_SCRIPT" "$NODEDIR/test.js"
            echo "test_runner=custom: using ${TEST_SCRIPT}."
            ;;
          *)
            echo "::error::Unknown test_runner '$TEST_RUNNER' (expected 'smoke', 'module', or 'custom')."
            exit 1
            ;;
        esac
