name: Publish Release

on:
  workflow_call:
    inputs:
      module_spec:
        type: string
        description: |
          '<module_name>@<version>' (e.g. 'sodium-native@5.1.0'). Output by
          prebuild.yml / prebuild-all.yml as `module_spec`. The release tag
          is the version part.
        required: true

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Resolve release tag
        id: tag
        env:
          MODULE_SPEC: ${{ inputs.module_spec }}
        shell: bash
        run: |
          set -eu
          MODULE_VERSION="${MODULE_SPEC##*@}"
          if [ -z "$MODULE_VERSION" ] || [ "$MODULE_VERSION" = "$MODULE_SPEC" ]; then
            echo "::error::module_spec must be '<module_name>@<version>', got '${MODULE_SPEC}'."
            exit 1
          fi
          echo "tag=${MODULE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: prebuilds

      - run: |
          mkdir -p artifacts
          for folder in prebuilds/*/; do
            folder_name=$(basename "$folder")
            tar -czvf "artifacts/${folder_name}.tar.gz" -C "prebuilds/${folder_name}" .
          done

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "artifacts/*"
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ steps.tag.outputs.tag }}
