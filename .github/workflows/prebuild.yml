name: Generate prebuild

on:
  workflow_dispatch:
    inputs:
      module_name:
        type: string
        description: "The name of the module to prebuild"
        required: true
      platform:
        type: choice
        description: "The platform to prebuild for"
        required: true
        options:
          - "android"
          - "ios"
        default: "android"
      arch:
        type: choice
        description: "The architecture to prebuild for"
        required: true
        options:
          - "arm64"
          - "x64"
          - "arm"
        default: "arm64"
      simulator:
        type: boolean
        description: "Build for an iOS simulator (ios only)"
        required: false
        default: false
      module_version:
        type: string
        description: "Exact version or dist-tag (e.g. '5.1.0' or 'latest'). Resolved by `npm pack`."
        required: false
        default: "latest"
      patches_dir:
        type: string
        description: |
          Directory in the caller repo holding `<module>+<version>.patch`
          files (patch-package convention). A patch matching the resolved
          module_version is applied before build.
        required: false
        default: "patches"
  workflow_call:
    inputs:
      module_name:
        type: string
        description: "The name of the module to prebuild"
        required: true
      platform:
        type: string
        description: "The platform to prebuild for"
        required: true
        default: "android"
      arch:
        type: string
        description: "The architecture to prebuild for"
        required: true
        default: "arm64"
      simulator:
        type: boolean
        description: "Build for an iOS simulator (ios only)"
        required: false
        default: false
      module_version:
        type: string
        description: "Exact version or dist-tag (e.g. '5.1.0' or 'latest'). Resolved by `npm pack`."
        required: false
        default: "latest"
      patches_dir:
        type: string
        description: |
          Directory in the caller repo holding `<module>+<version>.patch`
          files (patch-package convention). A patch matching the resolved
          module_version is applied before build.
        required: false
        default: "patches"
    outputs:
      module_version:
        description: "The resolved version of the module"
        value: ${{ jobs.build.outputs.module_version }}
      module_spec:
        description: "Combined '<module_name>@<version>'. Pass directly to test-*.yml / release.yml."
        value: ${{ inputs.module_name }}@${{ jobs.build.outputs.module_version }}

jobs:
  build:
    runs-on: ${{ inputs.platform == 'ios' && 'macos-latest' || 'ubuntu-22.04' }}
    timeout-minutes: 10
    name: ${{ inputs.module_name }} (${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.simulator && '-simulator' || '' }})
    outputs:
      module_version: ${{ steps.prebuild.outputs.module_version }}
    steps:
      # Caller's repo — needed so `patches_dir` (a caller-relative path)
      # resolves against the workspace root.
      - uses: actions/checkout@v6

      # This repo, pinned to the same commit as the reusable workflow
      # itself (`github.workflow_sha`) so callers pinning to a semver tag
      # get the matching action. Expressions aren't allowed directly in a
      # step-level `uses:` ref, so we pull the action in as a local path
      # via a second checkout rather than a remote `…@ref` reference.
      - uses: actions/checkout@v6
        with:
          repository: digidem/nodejs-mobile-bare-prebuilds
          ref: ${{ github.workflow_sha }}
          path: .nodejs-mobile-bare-prebuilds

      - uses: ./.nodejs-mobile-bare-prebuilds/.github/actions/prebuild
        id: prebuild
        with:
          module_name: ${{ inputs.module_name }}
          platform: ${{ inputs.platform }}
          arch: ${{ inputs.arch }}
          simulator: ${{ inputs.simulator }}
          module_version: ${{ inputs.module_version }}
          patches_dir: ${{ inputs.patches_dir }}
