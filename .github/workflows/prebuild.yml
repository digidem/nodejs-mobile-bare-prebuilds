name: Generate prebuild

on:
  workflow_dispatch:
    inputs:
      module_name:
        type: string
        description: "The name of the module to prebuild"
        required: true
      platform:
        type: choice
        description: "The platform to prebuild for"
        required: true
        options:
          - "android"
          - "ios"
        default: "android"
      arch:
        type: choice
        description: "The architecture to prebuild for"
        required: true
        options:
          - "arm64"
          - "x64"
          - "arm"
        default: "arm64"
      simulator:
        type: boolean
        description: "Build for an iOS simulator (ios only)"
        required: false
        default: false
      module_version:
        type: string
        description: "The version of the module to prebuild"
        required: false
        default: "latest"
      patch_file:
        type: string
        description: "Path to patch file to apply to the module (optional)"
        required: false
      runner:
        type: choice
        description: "The runner to use for the build"
        required: true
        options:
          - "ubuntu-22.04"
          - "macos-latest"
          - "windows-latest"
        default: "ubuntu-22.04"
  workflow_call:
    inputs:
      module_name:
        type: string
        description: "The name of the module to prebuild"
        required: true
      platform:
        type: string
        description: "The platform to prebuild for"
        required: true
        default: "android"
      arch:
        type: string
        description: "The architecture to prebuild for"
        required: true
        default: "arm64"
      simulator:
        type: boolean
        description: "Build for an iOS simulator (ios only)"
        required: false
        default: false
      module_version:
        type: string
        description: "The version of the module to prebuild"
        required: false
        default: "latest"
      patch_file:
        type: string
        description: "Path to patch file to apply to the module (optional)"
        required: false
      runner:
        type: string
        description: "The runner to use for the build"
        required: true
        default: "ubuntu-22.04"
    outputs:
      module_version:
        description: "The version of the module"
        value: ${{ jobs.build.outputs.module_version }}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    name: ${{ inputs.module_name }} (${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.simulator && '-simulator' || '' }})
    outputs:
      module_version: ${{ steps.prebuild.outputs.module_version }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/prebuild
        id: prebuild
        with:
          module_name: ${{ inputs.module_name }}
          platform: ${{ inputs.platform }}
          arch: ${{ inputs.arch }}
          simulator: ${{ inputs.simulator }}
          module_version: ${{ inputs.module_version }}
          patch_file: ${{ inputs.patch_file }}
