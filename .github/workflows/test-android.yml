name: Test on Android emulator

on:
  workflow_call:
    inputs:
      module_spec:
        type: string
        description: |
          '<module_name>@<version>' (e.g. 'sodium-native@5.1.0'). Output by
          prebuild.yml / prebuild-all.yml as `module_spec` — keeps the test
          pinned to the exact version that was built.
        required: true
      target:
        type: string
        description: |
          Prebuild target: 'android-x64' or 'android-arm64'. Determines the
          prebuilds/<target>/ directory the .node is installed into, the
          emulator architecture, and the default artifact_name. Defaults to
          'android-x64' — the only target that runs on the Ubuntu x86_64
          runner without nested virtualization.
        required: false
        default: "android-x64"
      artifact_name:
        type: string
        description: |
          Name of the prebuild artifact uploaded earlier in the run.
          If empty (the default), it's computed as `<module_name>-<module_version>-<target>`,
          matching the name `prebuild.yml` / `prebuild-all.yml` upload with.
        required: false
        default: ""
      test_runner:
        type: string
        description: |
          One of 'smoke' (default), 'module', or 'custom'.
          - 'smoke':  auto-generated test that just require()s the module.
          - 'module': runs the module's own test/*.js via brittle.
          - 'custom': uses the file pointed to by `test_script`.
        required: false
        default: "smoke"
      test_script:
        type: string
        description: |
          Path to a caller-provided test script (relative to the caller repo
          root). Only used when test_runner is 'custom'.
        required: false
        default: ""
      nodejs_mobile_version:
        type: string
        description: "nodejs-mobile release tag to download libnode from"
        required: false
        default: "v18.20.4"
      api_level:
        type: number
        description: "Android API level for the emulator"
        required: false
        default: 30
      harness_ref:
        type: string
        description: "Ref of digidem/nodejs-mobile-bare-prebuilds to pull the harness from"
        required: false
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Map target to emulator arch
        id: inputs
        env:
          TARGET: ${{ inputs.target }}
        shell: bash
        run: |
          set -eu
          case "$TARGET" in
            android-x64)   echo "emulator_arch=x86_64"    >> "$GITHUB_OUTPUT" ;;
            android-arm64) echo "emulator_arch=arm64-v8a" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::Unsupported target '$TARGET' for Android tests (must be android-x64 or android-arm64)."
              exit 1
              ;;
          esac

      - name: Checkout caller repo
        uses: actions/checkout@v6

      - name: Checkout test harness
        uses: actions/checkout@v6
        with:
          repository: digidem/nodejs-mobile-bare-prebuilds
          ref: ${{ inputs.harness_ref }}
          path: .nodejs-mobile-bare-prebuilds

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache nodejs-mobile android binaries
        id: cache-libnode
        uses: actions/cache@v5
        with:
          path: .nodejs-mobile-bare-prebuilds/test-harness/android/app/libnode
          key: libnode-android-${{ inputs.nodejs_mobile_version }}

      - name: Download nodejs-mobile android libraries
        if: steps.cache-libnode.outputs.cache-hit != 'true'
        env:
          NM_VERSION: ${{ inputs.nodejs_mobile_version }}
        run: |
          set -euo pipefail
          harness=.nodejs-mobile-bare-prebuilds/test-harness/android
          tmp=$(mktemp -d)
          url="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/${NM_VERSION}/nodejs-mobile-${NM_VERSION}-android.zip"
          echo "Downloading $url"
          curl -fL "$url" -o "$tmp/libnode.zip"
          unzip -q "$tmp/libnode.zip" -d "$tmp/libnode"
          mkdir -p "$harness/app/libnode"
          # Zip layout: include/node/*.h, bin/<abi>/libnode.so
          cp -R "$tmp/libnode/include" "$harness/app/libnode/"
          cp -R "$tmp/libnode/bin"     "$harness/app/libnode/"

      - name: Assemble nodejs-project
        uses: ./.nodejs-mobile-bare-prebuilds/.github/actions/assemble-test-project
        with:
          module_spec: ${{ inputs.module_spec }}
          target: ${{ inputs.target }}
          artifact_name: ${{ inputs.artifact_name }}
          test_runner: ${{ inputs.test_runner }}
          test_script: ${{ inputs.test_script }}
          nodejs_project_dir: .nodejs-mobile-bare-prebuilds/test-harness/android/app/src/main/assets/nodejs-project

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "8.9"

      - name: Build APK
        working-directory: .nodejs-mobile-bare-prebuilds/test-harness/android
        env:
          ABI: ${{ steps.inputs.outputs.emulator_arch }}
        run: gradle -PabiFilter=${ABI} :app:assembleDebug --no-daemon

      - name: Cache AVD
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api${{ inputs.api_level }}-${{ steps.inputs.outputs.emulator_arch }}-v1

      - name: Generate AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ inputs.api_level }}
          target: google_atd
          arch: ${{ steps.inputs.outputs.emulator_arch }}
          force-avd-creation: false
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "AVD cached"

      - name: Run test on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: ${{ inputs.api_level }}
          target: google_atd
          arch: ${{ steps.inputs.outputs.emulator_arch }}
          force-avd-creation: false
          ram-size: 4096M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          # android-emulator-runner runs each LINE of `script:` as a separate
          # `sh -c` invocation, so variable state and `set` flags don't
          # persist across lines. Delegate to a committed bash script.
          script: bash $GITHUB_WORKSPACE/.nodejs-mobile-bare-prebuilds/test-harness/android/run-test.sh
